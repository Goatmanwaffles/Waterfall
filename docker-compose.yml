services:
    web:
        build: .
        ports:
         - "4500:4500"
        depends_on:
          db:
            condition: service_healthy
        volumes:
         - .:/app
         - /app/.venv
         - /app/node_modules
        environment:
         - DATABASE_HOST=db

    db:
        image: mysql:8.4
        ports:
         - "3306:3306"
        environment:
         - MYSQL_ALLOW_EMPTY_PASSWORD=yes
        volumes:
         - mysql_data:/var/lib/mysql
        healthcheck:
          test: ["CMD", "mysql", "-h", "localhost", "-u", "root", "-e", "SELECT 1"]
          interval: 5s
          timeout: 3s
          retries: 15
          start_period: 10s

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
         - "8080:80"
        environment:
         - PMA_HOST=db
        depends_on:
          db:
            condition: service_healthy

volumes:
    mysql_data:
